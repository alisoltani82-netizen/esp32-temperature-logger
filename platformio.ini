[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

; --- Serial over native USB (critical on C3) ---
board_build.arduino.usb_mode = cdc
board_build.arduino.usb_cdc_on_boot = 1
build_flags = -DARDUINO_USB_CDC_ON_BOOT=1 -DARDUINO_USB_MODE=1

; --- Stable monitor settings ---
monitor_port = COM9        ; put the actual COM you see in Device Manager
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
monitor_filters = time, esp32_exception_decoder

; libs as needed...
